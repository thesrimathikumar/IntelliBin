<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen">
    <div class="bg-slate-900 p-12 rounded-[3rem] border border-blue-500/30 w-full max-w-md shadow-2xl">
        <h2 class="text-3xl font-black text-blue-500 mb-6 text-center">ADMIN LOGIN</h2>
        <form action="/auth" method="POST" class="space-y-4">
            <input type="email" name="email" placeholder="Admin Email" class="w-full bg-black p-4 rounded-2xl" required>
            <input type="password" name="password" placeholder="Admin Password" class="w-full bg-black p-4 rounded-2xl" required>
            <button name="action" value="login" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl">Enter Dashboard</button>
        </form>
    </div>
</body>
</html>
